<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Authorized Access Only | Mall Billing System" />
    <title>Secure Entry | Mall Phoenix</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#1e1b4b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
        rel="stylesheet" />

    <style>
        .glass-login {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
    <link rel="manifest" href="/manifest.json">
</head>

<body
    class="h-full font-sans antialiased bg-slate-950 text-gray-100 flex items-center justify-center p-6 overflow-hidden">

    <!-- Abstract Background -->
    <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(99,102,241,0.1),transparent)] pointer-events-none">
    </div>
    <div
        class="absolute inset-0 bg-[linear-gradient(to_right,rgba(30,41,59,0.3)_1px,transparent_1px),linear-gradient(to_bottom,rgba(30,41,59,0.3)_1px,transparent_1px)] bg-[size:3rem_3rem] pointer-events-none">
    </div>

    <div class="relative w-full max-w-md">

        <!-- Header -->
        <div class="text-center mb-10">
            <div
                class="w-16 h-16 rounded-3xl bg-brand-600 mx-auto flex items-center justify-center shadow-2xl shadow-brand-600/40 mb-6">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight uppercase">Phoenix Terminal</h1>
            <p class="text-xs font-bold text-muted uppercase tracking-[0.3em] mt-2">Authorized Access Only</p>
        </div>

        <!-- Login Card -->
        <div class="glass-login rounded-3xl p-10 shadow-3xl">

            {% if error %}
            <div
                class="flex items-center gap-4 mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-bold">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                        stroke-width="2" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                class="flex items-center gap-4 mb-6 p-4 rounded-xl bg-brand-500/5 border border-brand-500/10 text-brand-300 text-xs font-bold">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" />
                </svg>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-[10px] font-bold text-muted uppercase tracking-widest mb-3">Operator
                        ID</label>
                    <input name="username" type="text" required autofocus placeholder="Digital Identity"
                        class="w-full bg-slate-950 border border-white/5 rounded-2xl px-5 py-4 text-sm text-white placeholder-slate-700 outline-none focus:border-brand-500 transition-all">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-muted uppercase tracking-widest mb-3">Secure
                        Key</label>
                    <input name="password" type="password" required placeholder="••••••••"
                        class="w-full bg-slate-950 border border-white/5 rounded-2xl px-5 py-4 text-sm text-white placeholder-slate-800 outline-none focus:border-brand-500 transition-all">
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full py-4 bg-brand-600 hover:bg-brand-500 text-white font-black rounded-2xl shadow-2xl shadow-brand-600/20 transition-all uppercase tracking-widest text-sm">
                        Authenticate Access
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center">
            <p class="text-[10px] font-bold text-slate-700 uppercase tracking-widest">Powered by Mall Infrastructure ·
                v2.4.0</p>
        </div>

    </div>

    <!-- PWA Scripts -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>

</body>

</html>
