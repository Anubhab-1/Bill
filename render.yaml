services:
  - type: web
    name: mall-billing-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask patch-db && gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --timeout 120 --max-requests 1000 --max-requests-jitter 100 -b 0.0.0.0:10000 wsgi:app
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: CLOUD_DEMO
        value: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: mall-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mall-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: redis
    name: mall-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

databases:
  - name: mall-db
    databaseName: mall
    user: mall_user
    plan: free
